<!doctype html>
<html>
  <head>
    {% block head %}
    <script src="{{url_for('static', filename='js/jquery.min.js')}}">
    </script>
    <script src="{{url_for('static', filename='js/test.js')}}">
    </script>
    <script src="{{url_for('static', filename='js/layer/layerConfig.js.js')}}">
    </script>
    <script src="{{url_for('static', filename='js/layer/layer.js')}}">
    </script>
    <script src="{{url_for('static', filename='js/bootstrap.js')}}">
    </script>
    <script src="{{url_for('static', filename='js/bootstrap.min.js')}}">
    </script>
    <link rel="stylesheet" type="text/css" href="{{url_for('static', filename='CSS/home.css')}}">
    <link rel="stylesheet" type="text/css" href="{{url_for('static', filename='CSS/bootstrap.css')}}">
    <link rel="stylesheet" type="text/css" href="{{url_for('static', filename='CSS/bootstrap.min.css')}}">
    <link rel="stylesheet" type="text/css" href="{{url_for('static', filename='CSS/bootstrap-theme.css')}}">
    <link rel="stylesheet" type="text/css" href="{{url_for('static', filename='CSS/bootstrap-theme.min.css')}}">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>{% block title %}{% endblock %} - My Webpage</title>
    {% endblock %}
  </head>
<body>
<div class="container" style="width: auto">
    <h1 style="color: #77852d">惬意 嗨Go</h1>
    <p style="border: #8e9d72;text-align: left ;font-size: 15px; font-family: 'Consolas', 'Monaco', 'Bitstream Vera Sans Mono', monospace">欢迎您,{{ session["username"] }}</p>
    <nav class="navbar navbar-inverse">
        <!-- Brand and toggle get grouped for better mobile display -->
        <div class="navbar-header">
            <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar-menu" aria-expanded="false">
                <span class="sr-only">Home</span>
                <span class="icon-bar">Note for u</span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
            <a class="navbar-brand" href="#">GO FROM HERE</a>
        </div>
        <div id="navbar-menu" class="collapse navbar-collapse">
            <ul class="nav navbar-nav">
                <li><a href="{{ url_for('home') }}">Rank</a></li>
                <li><a href="{{ url_for('photo') }}">Photo</a></li>
                <li><a href="{{ url_for('note') }}">Note</a></li>
            </ul>
        </div>
    </nav>
  <div id="content">{% block content %}{% endblock %}</div>
</div>
</body>
  </html>
